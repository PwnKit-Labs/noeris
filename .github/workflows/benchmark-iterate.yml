name: Benchmark Iterate

on:
  workflow_dispatch:
    inputs:
      benchmark_id:
        description: "Benchmark id to iterate on"
        required: false
        default: "matmul-speedup"
      iterations:
        description: "Number of bounded iterations"
        required: false
        default: "2"
      auto_chain_runs_remaining:
        description: "How many follow-up workflow runs to auto-dispatch after this one (scheduled runs default to 20)"
        required: false
        default: "0"
      auto_chain_policy:
        description: "Auto-dispatch policy: never, always, improve_or_frontier, improve_only, frontier_only"
        required: false
        default: "improve_or_frontier"
      min_metric_delta:
        description: "Minimum metric improvement required for improve-based chaining"
        required: false
        default: "0.25"

concurrency:
  group: noeris-benchmark-iterate-${{ github.ref }}-${{ github.event.inputs.benchmark_id || 'matmul-speedup' }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  benchmark-iterate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: write
      contents: read
    env:
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_BASE_URL: ${{ vars.AZURE_OPENAI_BASE_URL }}
      AZURE_OPENAI_MODEL: ${{ vars.AZURE_OPENAI_MODEL }}
      AZURE_OPENAI_WIRE_API: ${{ vars.AZURE_OPENAI_WIRE_API }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Restore prior benchmark history
        env:
          GH_TOKEN: ${{ github.token }}
          NOERIS_BENCHMARK_ID: ${{ github.event.inputs.benchmark_id || 'matmul-speedup' }}
        run: |
          python - <<'PY'
          import json
          import os
          import shutil
          import subprocess
          import tempfile
          from pathlib import Path

          benchmark_id = os.environ["NOERIS_BENCHMARK_ID"]
          current_run_id = os.environ["GITHUB_RUN_ID"]
          ref_name = os.environ["GITHUB_REF_NAME"]
          repository = os.environ["GITHUB_REPOSITORY"]
          workspace_runs = Path(".noeris/runs")
          workspace_runs.mkdir(parents=True, exist_ok=True)

          runs = json.loads(
              subprocess.check_output(
                  [
                      "gh",
                      "-R",
                      repository,
                      "run",
                      "list",
                      "--workflow",
                      "Benchmark Iterate",
                      "--branch",
                      ref_name,
                      "-L",
                      "20",
                      "--json",
                      "databaseId,conclusion",
                  ],
                  text=True,
              )
          )

          restored_paths: list[Path] = []
          for run in runs:
              run_id = str(run.get("databaseId", "")).strip()
              if not run_id or run_id == current_run_id or run.get("conclusion") != "success":
                  continue
              artifact_name = f"benchmark-iterate-{run_id}"
              with tempfile.TemporaryDirectory() as temp_dir:
                  try:
                      subprocess.run(
                          [
                              "gh",
                              "-R",
                              repository,
                              "run",
                              "download",
                              run_id,
                              "-n",
                              artifact_name,
                              "-D",
                              temp_dir,
                          ],
                          check=True,
                          stdout=subprocess.DEVNULL,
                          stderr=subprocess.DEVNULL,
                      )
                  except subprocess.CalledProcessError:
                      continue

                  extracted_root = Path(temp_dir)
                  iterate_run_candidates = list(extracted_root.rglob("iterate-run.json"))
                  if not iterate_run_candidates:
                      continue
                  iterate_run_path = iterate_run_candidates[0]
                  payload = json.loads(iterate_run_path.read_text())
                  if payload.get("benchmark_id") != benchmark_id:
                      continue

                  for source_path in sorted(extracted_root.rglob(".noeris/runs/*.json")):
                      target_path = workspace_runs / source_path.name
                      if target_path.exists():
                          continue
                      shutil.copy2(source_path, target_path)
                      restored_paths.append(target_path)
                      if len(restored_paths) >= 20:
                          break
              if len(restored_paths) >= 20:
                  break

          if restored_paths:
              print(
                  json.dumps(
                      {
                          "benchmark_id": benchmark_id,
                          "restored_run_count": len(restored_paths),
                          "restored_run_ids": [path.stem for path in restored_paths],
                      },
                      indent=2,
                  )
              )
          else:
              print(
                  json.dumps(
                      {
                          "benchmark_id": benchmark_id,
                          "restored_run_count": 0,
                          "restored_run_ids": [],
                      },
                      indent=2,
                  )
              )
          PY

      - name: Run bounded benchmark iteration
        run: |
          python -m research_engine.cli iterate \
            "${{ github.event.inputs.benchmark_id || 'matmul-speedup' }}" \
            --iterations "${{ github.event.inputs.iterations || '3' }}" \
            --llm \
            --live-execution > iterate-run.json

      - name: Evaluate auto-chain policy
        id: auto_chain
        env:
          NOERIS_BENCHMARK_ID: ${{ github.event.inputs.benchmark_id || 'matmul-speedup' }}
          NOERIS_ITERATIONS: ${{ github.event.inputs.iterations || '3' }}
          NOERIS_AUTO_CHAIN_RUNS_REMAINING: ${{ github.event.inputs.auto_chain_runs_remaining || '20' }}
          NOERIS_AUTO_CHAIN_POLICY: ${{ github.event.inputs.auto_chain_policy || 'improve_or_frontier' }}
          NOERIS_MIN_METRIC_DELTA: ${{ github.event.inputs.min_metric_delta || '0.15' }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path("iterate-run.json").read_text())
          remaining = int(os.environ["NOERIS_AUTO_CHAIN_RUNS_REMAINING"])
          policy = os.environ["NOERIS_AUTO_CHAIN_POLICY"]
          min_metric_delta = float(os.environ["NOERIS_MIN_METRIC_DELTA"])
          previous_best_metric = payload.get("previous_best_metric")
          best_metric = payload.get("best_metric")
          metric_delta = None
          if isinstance(previous_best_metric, (int, float)) and isinstance(best_metric, (int, float)):
              metric_delta = round(best_metric - previous_best_metric, 4)

          frontier_delta = payload.get("frontier_delta") or {}
          frontier_changed = bool(
              frontier_delta.get("best_candidate_changed")
              or frontier_delta.get("candidate_set_changed")
          )
          meaningful_improvement = bool(
              payload.get("outcome") == "improved"
              and metric_delta is not None
              and metric_delta >= min_metric_delta
          )

          should_dispatch = False
          reason = "remaining_exhausted"
          if remaining > 0:
              if policy == "never":
                  reason = "policy_never"
              elif policy == "always":
                  should_dispatch = True
                  reason = "policy_always"
              elif policy == "improve_or_frontier":
                  should_dispatch = meaningful_improvement or frontier_changed
                  reason = (
                      "meaningful_improvement"
                      if meaningful_improvement
                      else "frontier_changed"
                      if frontier_changed
                      else "no_meaningful_change"
                  )
              elif policy == "improve_only":
                  should_dispatch = meaningful_improvement
                  reason = "meaningful_improvement" if meaningful_improvement else "no_meaningful_improvement"
              elif policy == "frontier_only":
                  should_dispatch = frontier_changed
                  reason = "frontier_changed" if frontier_changed else "no_frontier_change"
              else:
                  reason = f"unknown_policy:{policy}"

          next_remaining = max(remaining - 1, 0) if should_dispatch else remaining
          decision = {
              "benchmark_id": payload["benchmark_id"],
              "policy": policy,
              "remaining_before": remaining,
              "next_auto_chain_runs_remaining": next_remaining,
              "should_dispatch": should_dispatch,
              "reason": reason,
              "min_metric_delta": min_metric_delta,
              "metric_delta": metric_delta,
              "outcome": payload.get("outcome"),
              "frontier_changed": frontier_changed,
              "meaningful_improvement": meaningful_improvement,
          }
          Path("auto-chain-decision.json").write_text(
              json.dumps(decision, indent=2) + "\n",
              encoding="utf-8",
          )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"should_dispatch={'true' if should_dispatch else 'false'}\n")
              output.write(f"next_remaining={next_remaining}\n")
              output.write(f"reason={reason}\n")
          print(json.dumps(decision, indent=2))
          PY

      - name: Render iteration summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("iterate-run.json").read_text())
          decision = json.loads(Path("auto-chain-decision.json").read_text())
          lines = [
              f"# Benchmark Iterate: {payload['benchmark_id']}",
              "",
              f"- Iterations: `{payload['iterations']}`",
              f"- Previous best metric: `{payload['previous_best_metric']}`",
              f"- Best run id: `{payload['best_run_id']}`",
              f"- Best metric: `{payload['best_metric']}`",
              f"- Outcome: `{payload['outcome']}`",
              "",
              "## Auto Chain",
              "",
              f"- Policy: `{decision['policy']}`",
              f"- Should dispatch next run: `{decision['should_dispatch']}`",
              f"- Reason: `{decision['reason']}`",
              f"- Metric delta: `{decision['metric_delta']}`",
              f"- Minimum metric delta: `{decision['min_metric_delta']}`",
              f"- Frontier changed: `{decision['frontier_changed']}`",
              f"- Meaningful improvement: `{decision['meaningful_improvement']}`",
              f"- Remaining after this step: `{decision['next_auto_chain_runs_remaining']}`",
              "",
          ]
          best_frontier = payload.get("best_frontier") or {}
          if best_frontier:
              lines.extend(
                  [
                      "## Frontier",
                      "",
                      f"- Best candidate: `{best_frontier.get('best_candidate_id', '')}`",
                      f"- Proposal source: `{best_frontier.get('proposal_source', '')}`",
                      f"- Selected candidates: `{', '.join(best_frontier.get('selected_candidate_ids', []))}`",
                      "",
                  ]
              )
          frontier_delta = payload.get("frontier_delta") or {}
          if frontier_delta:
              lines.extend(
                  [
                      "## Frontier Delta",
                      "",
                      f"- Best candidate changed: `{frontier_delta.get('best_candidate_changed', False)}`",
                      f"- Candidate set changed: `{frontier_delta.get('candidate_set_changed', False)}`",
                      f"- Added candidates: `{', '.join(frontier_delta.get('added_candidates', [])) or 'none'}`",
                      f"- Dropped candidates: `{', '.join(frontier_delta.get('dropped_candidates', [])) or 'none'}`",
                      "",
                  ]
              )
          lines.extend(
              [
              "## Runs",
              "",
              ]
          )
          for run in payload["runs"]:
              lines.append(
                  f"- `{run['run_id']}` | metric=`{run['metric']}` | bundle=`{run['bundle_dir']}`"
              )
          Path("iterate-report.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Auto-dispatch next benchmark iteration
        if: ${{ steps.auto_chain.outputs.should_dispatch == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          NOERIS_BENCHMARK_ID: ${{ github.event.inputs.benchmark_id || 'matmul-speedup' }}
          NOERIS_ITERATIONS: ${{ github.event.inputs.iterations || '3' }}
          NOERIS_AUTO_CHAIN_POLICY: ${{ github.event.inputs.auto_chain_policy || 'improve_or_frontier' }}
          NOERIS_MIN_METRIC_DELTA: ${{ github.event.inputs.min_metric_delta || '0.15' }}
          NOERIS_AUTO_CHAIN_NEXT_REMAINING: ${{ steps.auto_chain.outputs.next_remaining }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          payload = json.loads(Path("iterate-run.json").read_text())
          next_remaining = int(os.environ["NOERIS_AUTO_CHAIN_NEXT_REMAINING"])
          subprocess.run(
              [
                  "gh",
                  "-R",
                  os.environ["GITHUB_REPOSITORY"],
                  "workflow",
                  "run",
                  "benchmark-iterate.yml",
                  "-f",
                  f"benchmark_id={os.environ['NOERIS_BENCHMARK_ID']}",
                  "-f",
                  f"iterations={os.environ['NOERIS_ITERATIONS']}",
                  "-f",
                  f"auto_chain_runs_remaining={next_remaining}",
                  "-f",
                  f"auto_chain_policy={os.environ['NOERIS_AUTO_CHAIN_POLICY']}",
                  "-f",
                  f"min_metric_delta={os.environ['NOERIS_MIN_METRIC_DELTA']}",
              ],
              check=True,
          )
          print(
              json.dumps(
                  {
                      "benchmark_id": payload["benchmark_id"],
                      "current_run_id": os.environ["GITHUB_RUN_ID"],
                      "outcome": payload["outcome"],
                      "dispatched_next_run": True,
                      "next_auto_chain_runs_remaining": next_remaining,
                  },
                  indent=2,
              )
          )
          PY

      - name: Upload iteration artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-iterate-${{ github.run_id }}
          path: |
            iterate-run.json
            iterate-report.md
            auto-chain-decision.json
            .noeris/runs/*.json
            .noeris/artifacts/**
