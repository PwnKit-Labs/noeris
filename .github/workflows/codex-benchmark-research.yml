name: LLM Benchmark Research

on:
  workflow_dispatch:
    inputs:
      benchmark_id:
        description: "Benchmark id to research"
        required: false
        default: "long-context-reasoning"
      max_results:
        description: "Source results per provider"
        required: false
        default: "3"
  schedule:
    - cron: "0 8 * * 3"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NOERIS_BENCHMARK_ID: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.benchmark_id || 'long-context-reasoning' }}
  NOERIS_MAX_RESULTS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_results || '3' }}

jobs:
  llm-benchmark-research:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_BASE_URL: ${{ vars.AZURE_OPENAI_BASE_URL }}
      AZURE_OPENAI_MODEL: ${{ vars.AZURE_OPENAI_MODEL }}
      AZURE_OPENAI_WIRE_API: ${{ vars.AZURE_OPENAI_WIRE_API }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Gather sources
        run: python -m research_engine.cli sources --topic "${NOERIS_BENCHMARK_ID}" --max-results "${NOERIS_MAX_RESULTS}" > noeris-sources.json
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run Noeris LLM research cycle
        run: python -m research_engine.cli benchmark-run "${NOERIS_BENCHMARK_ID}" --llm --live-execution --max-results "${NOERIS_MAX_RESULTS}" > noeris-run.json
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Render research report
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("noeris-run.json").read_text())
          memo = payload["memo"]
          verification = payload["verification"]
          cost_summary = None
          for result in memo["results"]:
              payloads = result.get("artifact_payloads", {})
              if "cost-summary.json" in payloads:
                  cost_summary = payloads["cost-summary.json"]
                  break

          lines = [
              f"# Noeris Benchmark Research: {payload['benchmark_id']}",
              "",
              f"- Run ID: `{payload['run_id']}`",
              f"- Verification passed: `{verification['passed']}`",
              "",
          ]
          if cost_summary:
              lines.extend(
                  [
                      "## Cost Summary",
                      "",
                      f"- Requests: `{cost_summary.get('request_count', 0)}`",
                      f"- Tokens: `{cost_summary.get('total_tokens', 0)}`",
                      f"- Elapsed ms: `{cost_summary.get('elapsed_ms', 0)}`",
                  ]
              )
              if cost_summary.get("estimated_cost_usd") is not None:
                  lines.append(
                      f"- Estimated cost USD: `{cost_summary['estimated_cost_usd']}`"
                  )
              lines.append("")
          lines.extend(["## Sources", ""])
          for source in memo["sources"]:
              lines.append(f"- **{source['title']}** ({source['kind']})")
              lines.append(f"  - Locator: `{source['locator']}`")
              lines.append(f"  - Excerpt: {source['excerpt']}")
          lines.extend(["", "## Claims", ""])
          for claim in memo["claims"]:
              lines.append(f"- **{claim['title']}**")
              lines.append(f"  - Source: `{claim['source']}`")
              lines.append(f"  - Summary: {claim['summary']}")
          lines.extend(["", "## Hypotheses", ""])
          for hypothesis in memo["hypotheses"]:
              lines.append(f"- **{hypothesis['title']}**")
              lines.append(f"  - Rationale: {hypothesis['rationale']}")
              lines.append(f"  - Expected signal: {hypothesis['expected_signal']}")
          lines.extend(["", "## Verification", ""])
          lines.append(f"- Checks: `{', '.join(verification['checks'])}`")
          blockers = verification.get("blockers") or []
          lines.append(f"- Blockers: `{', '.join(blockers) if blockers else 'none'}`")
          Path("noeris-report.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload research artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llm-benchmark-research-${{ github.run_id }}
          path: |
            noeris-sources.json
            noeris-run.json
            noeris-report.md
            .noeris/runs/*.json
            .noeris/artifacts/**
