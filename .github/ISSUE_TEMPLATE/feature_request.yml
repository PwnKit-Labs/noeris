name: Feature Request
description: Suggest a new capability, benchmark, or infrastructure feature
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: Description
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Use case
      description: Why do you need this?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Evidence or references
      description: Papers, repos, benchmarks, or examples that motivate the request

