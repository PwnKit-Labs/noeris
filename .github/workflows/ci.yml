name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: noeris-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e . numpy scikit-learn pytest pytest-timeout

      - name: Run unit tests
        run: python -m pytest tests/ -x -q --timeout=60

      - name: Check public artifact references
        run: python scripts/check_public_claim_artifacts.py

      - name: Generate fresh matmul runs for history
        run: |
          python -m research_engine.cli benchmark-run matmul-speedup
          python -m research_engine.cli benchmark-run matmul-speedup

      - name: Export matmul history artifacts
        run: python -m research_engine.cli export-history --benchmark-id matmul-speedup --output-dir .noeris/history

      - name: Check exported history regressions
        run: python scripts/check_history_regressions.py --path .noeris/history/history-regressions.json --summary-path .noeris/history/history-summary.json --benchmark-id matmul-speedup --fail-on-missing
