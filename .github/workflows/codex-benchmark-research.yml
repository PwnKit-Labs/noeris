name: Codex Benchmark Research

on:
  workflow_dispatch:
    inputs:
      benchmark_id:
        description: "Benchmark id to research"
        required: false
        default: "long-context-reasoning"
      max_results:
        description: "Source results per provider"
        required: false
        default: "3"
  schedule:
    - cron: "0 8 * * 3"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NOERIS_BENCHMARK_ID: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.benchmark_id || 'long-context-reasoning' }}
  NOERIS_MAX_RESULTS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_results || '3' }}

jobs:
  codex-benchmark-research:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_BASE_URL: ${{ vars.AZURE_OPENAI_BASE_URL }}
      AZURE_OPENAI_MODEL: ${{ vars.AZURE_OPENAI_MODEL }}
      AZURE_OPENAI_WIRE_API: ${{ vars.AZURE_OPENAI_WIRE_API }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Check required secret
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY is not set for this repository."
            exit 1
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Gather sources
        run: python -m research_engine.cli sources --topic "${NOERIS_BENCHMARK_ID}" --max-results "${NOERIS_MAX_RESULTS}" > codex-sources.json

      - name: Run Codex research pass
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/benchmark-research.md
          write-output: codex-report.md
        env:
          NOERIS_BENCHMARK_ID: ${{ env.NOERIS_BENCHMARK_ID }}

      - name: Upload research artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-benchmark-research-${{ github.run_id }}
          path: |
            codex-sources.json
            codex-report.md
