name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: noeris-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e . numpy scikit-learn pytest pytest-timeout

      - name: Run unit tests
        run: python -m pytest tests/ -x -q --timeout=60
